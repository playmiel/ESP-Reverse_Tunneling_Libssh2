[platformio]
default_envs = arduino-3
lib_dir = .

src_dir = examples/src

[env]
; Intentionally empty so [env:native] does not inherit ESP32-specific
; settings (framework, board, lib_deps, build_flags). ESP32 envs pick
; them up via `extends = esp32_common` below.

; Common settings shared by every ESP32 build env.
[esp32_common]
framework = arduino
board = esp32dev
build_flags =
    -DLIBSSH2_MBEDTLS
    -DHAVE_LIBSSH2_H
    -DLIBSSH2_NO_ZLIB
    -DHAVE_CONFIG_H
    -DCONFIG_ARDUHAL_ESP_LOG
    -DCORE_DEBUG_LEVEL=3
  ; To reduce memory_fixes overhead in production, uncomment one of the following lines:
  ; Default build uses MEMFIX_LEVEL=2 (FULL)
  ; -DMEMFIX_LEVEL=1   ; LIGHT (only malloc error logs)
  ; -DMEMFIX_LEVEL=0   ; OFF (no memory_fixes overhead)

lib_deps =
  https://github.com/playmiel/libssh2_esp.git#1.0

upload_protocol = esptool
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, log2file

;  CI

[env:ci]
extends = env:arduino-3
; CI can override via env if needed, but default to a valid platform locally
; platform = ${sysenv.PIO_PLATFORM}
; board = ${sysenv.PIO_BOARD}

[env:arduino-3]
extends = esp32_common
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.30-2/platform-espressif32.zip

[env:arduino-rc]
extends = esp32_common
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.10-rc3/platform-espressif32.zip
; inherits board and common settings

; Host-only Unity tests. Uses native toolchain on the host CPU.
; lib_ldf_mode=off + lib_compat_mode=strict prevent PIO from auto-picking
; the ESP32-only libssh2_esp dependency (which lives under lib_dir=.).
[env:native]
platform = native
test_framework = unity
lib_ldf_mode = off
lib_compat_mode = strict
lib_deps = throwtheswitch/Unity@^2.6.1
build_flags =
  -std=gnu++17
  -Wall
  -Wextra
  -DUNIT_TEST
test_build_src = no
